services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: memoryos
      POSTGRES_PASSWORD: memoryos
      POSTGRES_DB: memoryos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql://memoryos:memoryos@postgres:5432/memoryos?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "4400:4400"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
