name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memoryos
          POSTGRES_PASSWORD: memoryos
          POSTGRES_DB: memoryos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memoryos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://memoryos:memoryos@localhost:5432/memoryos?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-memoryos-secret-replace-in-production
      COOKIE_SECRET: ci-cookie-secret-replace-in-production
      FRONTEND_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
